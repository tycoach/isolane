# ─────────────────────────────────────────────────────────────────
# isolane — dbt connection profiles
# One profile per tenant namespace.
# Each profile connects as the scoped warehouse role for that
# namespace — which can only write to that namespace's schemas.
#
# Profiles are generated by the provisioner when a tenant is
# created. This file contains the reference profiles for the

# ─────────────────────────────────────────────────────────────────

isolane:
  outputs:

    # ── Analytics tenant ─────────────────────────────────────────
    analytics:
      type: postgres
      host: "{{ env_var('POSTGRES_HOST', 'postgres') }}"
      port: "{{ env_var('POSTGRES_PORT', '5432') | int }}"
      dbname: "{{ env_var('POSTGRES_DB', 'mtpif') }}"
      user: "{{ env_var('POSTGRES_USER', 'mtpif') }}"
      password: "{{ env_var('POSTGRES_PASSWORD', 'postgres') }}"
      schema: "{{ var('target_schema') }}"
      threads: 4
      connect_timeout: 30

    # ── Finance tenant ────────────────────────────────────────────
    finance:
      type: postgres
      host: "{{ env_var('POSTGRES_HOST', 'postgres') }}"
      port: "{{ env_var('POSTGRES_PORT', '5432') | int }}"
      dbname: "{{ env_var('POSTGRES_DB', 'mtpif') }}"
      user: "{{ env_var('POSTGRES_USER', 'mtpif') }}"
      password: "{{ env_var('POSTGRES_PASSWORD', 'postgres') }}"
      schema: "{{ var('target_schema') }}"
      threads: 2
      connect_timeout: 30

    # ── Growth tenant ─────────────────────────────────────────────
    growth:
      type: postgres
      host: "{{ env_var('POSTGRES_HOST', 'postgres') }}"
      port: "{{ env_var('POSTGRES_PORT', '5432') | int }}"
      dbname: "{{ env_var('POSTGRES_DB', 'mtpif') }}"
      user: "{{ env_var('POSTGRES_USER', 'mtpif') }}"
      password: "{{ env_var('POSTGRES_PASSWORD', 'postgres') }}"
      schema: "{{ var('target_schema') }}"
      threads: 4
      connect_timeout: 30

    # ── Dev / test profile (uses superuser, any schema) ───────────
    dev:
      type: postgres
      host: "{{ env_var('POSTGRES_HOST', 'postgres') }}"
      port: "{{ env_var('POSTGRES_PORT', '5432') | int }}"
      dbname: "{{ env_var('POSTGRES_DB', 'mtpif') }}"
      user: "{{ env_var('POSTGRES_USER', 'mtpif') }}"
      password: "{{ env_var('POSTGRES_PASSWORD', 'mtpif_dev') }}"
      schema: "{{ var('target_schema', 'public') }}"
      threads: 4
      connect_timeout: 30

  target: dev