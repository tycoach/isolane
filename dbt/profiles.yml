# ─────────────────────────────────────────────────────────────────
# isolane — dbt connection profiles
# One target per tenant namespace.
# ─────────────────────────────────────────────────────────────────

isolane:
  outputs:

    analytics:
      type: postgres
      host: "{{ env_var('POSTGRES_HOST', 'postgres') }}"
      port: "{{ env_var('POSTGRES_PORT', '5432') | int }}"
      dbname: "{{ env_var('POSTGRES_DB', 'mtpif') }}"
      user: "{{ env_var('POSTGRES_USER', 'mtpif') }}"
      password: "{{ env_var('POSTGRES_PASSWORD', 'postgres') }}"
      schema: "{{ var('target_schema') }}"
      threads: 4
      connect_timeout: 30

    finance:
      type: postgres
      host: "{{ env_var('POSTGRES_HOST', 'postgres') }}"
      port: "{{ env_var('POSTGRES_PORT', '5432') | int }}"
      dbname: "{{ env_var('POSTGRES_DB', 'mtpif') }}"
      user: "{{ env_var('POSTGRES_USER', 'mtpif') }}"
      password: "{{ env_var('POSTGRES_PASSWORD', 'postgres') }}"
      schema: "{{ var('target_schema') }}"
      threads: 2
      connect_timeout: 30

    growth:
      type: postgres
      host: "{{ env_var('POSTGRES_HOST', 'postgres') }}"
      port: "{{ env_var('POSTGRES_PORT', '5432') | int }}"
      dbname: "{{ env_var('POSTGRES_DB', 'mtpif') }}"
      user: "{{ env_var('POSTGRES_USER', 'mtpif') }}"
      password: "{{ env_var('POSTGRES_PASSWORD', 'postgres') }}"
      schema: "{{ var('target_schema') }}"
      threads: 4
      connect_timeout: 30

    brand_a:
      type: postgres
      host: "{{ env_var('POSTGRES_HOST', 'postgres') }}"
      port: "{{ env_var('POSTGRES_PORT', '5432') | int }}"
      dbname: "{{ env_var('POSTGRES_DB', 'mtpif') }}"
      user: "{{ env_var('POSTGRES_USER', 'mtpif') }}"
      password: "{{ env_var('POSTGRES_PASSWORD', 'postgres') }}"
      schema: "{{ var('target_schema') }}"
      threads: 4
      connect_timeout: 30

    brand_b:
      type: postgres
      host: "{{ env_var('POSTGRES_HOST', 'postgres') }}"
      port: "{{ env_var('POSTGRES_PORT', '5432') | int }}"
      dbname: "{{ env_var('POSTGRES_DB', 'mtpif') }}"
      user: "{{ env_var('POSTGRES_USER', 'mtpif') }}"
      password: "{{ env_var('POSTGRES_PASSWORD', 'postgres') }}"
      schema: "{{ var('target_schema') }}"
      threads: 4
      connect_timeout: 30

    brand_c:
      type: postgres
      host: "{{ env_var('POSTGRES_HOST', 'postgres') }}"
      port: "{{ env_var('POSTGRES_PORT', '5432') | int }}"
      dbname: "{{ env_var('POSTGRES_DB', 'mtpif') }}"
      user: "{{ env_var('POSTGRES_USER', 'mtpif') }}"
      password: "{{ env_var('POSTGRES_PASSWORD', 'postgres') }}"
      schema: "{{ var('target_schema') }}"
      threads: 4
      connect_timeout: 30

    dev:
      type: postgres
      host: "{{ env_var('POSTGRES_HOST', 'postgres') }}"
      port: "{{ env_var('POSTGRES_PORT', '5432') | int }}"
      dbname: "{{ env_var('POSTGRES_DB', 'mtpif') }}"
      user: "{{ env_var('POSTGRES_USER', 'mtpif') }}"
      password: "{{ env_var('POSTGRES_PASSWORD', 'postgres') }}"
      schema: "{{ var('target_schema', 'public') }}"
      threads: 4
      connect_timeout: 30

  target: dev
