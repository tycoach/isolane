groups:
  - name: isolane.engine
    rules:
      - alert: HighQuarantineRate
        expr: |
          sum(rate(ude_quarantine_total[5m])) by (tenant, pipeline)
          /
          sum(rate(ude_batch_records_processed_total[5m])) by (tenant, pipeline)
          > 0.10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High quarantine rate for {{ $labels.tenant }}.{{ $labels.pipeline }}"

      - alert: DLQDelivery
        expr: increase(ude_dlq_total[5m]) > 0
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "DLQ delivery in namespace {{ $labels.namespace }}"

      - alert: WorkerDown
        expr: up{job=~"engine-.*"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Worker down: {{ $labels.job }}"
