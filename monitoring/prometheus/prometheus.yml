global:
  scrape_interval:     30s
  evaluation_interval: 30s
  scrape_timeout:      10s

# Load alert rules
rule_files:
  - /etc/prometheus/alerts.yml

# Alertmanager connection
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

# Scrape configs — static targets + per-namespace files
scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Alertmanager
  - job_name: 'alertmanager'
    static_configs:
      - targets: ['alertmanager:9093']

# Per-namespace scrape configs loaded from directory
# Each file is written by the provisioner when a tenant is created
scrape_config_files:
  - /etc/prometheus/scrape_configs/*.yml